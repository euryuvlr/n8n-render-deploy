services:
  - type: web
    name: n8n-monitoramento
    runtime: docker
    repo: https://github.com/SEU_USUARIO/SEU_REPO  # Altere para seu repositório
    plan: free
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false  # Será definido manualmente no Render
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false  # Será definido manualmente no Render
      - key: N8N_HOST
        sync: false  # Será definido após deploy
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: "443"
    disk:
      name: n8n-data
      mountPath: /home/node/.n8n
      sizeGB: 1