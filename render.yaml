services:
  - type: web
    name: n8n-monitoramento
    runtime: docker
    repo: https://github.com/euryuvlr/n8n-render-deploy
    plan: free
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        sync: false
      - key: N8N_BASIC_AUTH_PASSWORD
        sync: false
      - key: N8N_HOST
        sync: false
      - key: N8N_PROTOCOL
        value: https
      - key: N8N_PORT
        value: "443"